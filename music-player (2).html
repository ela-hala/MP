<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: transparent;
    width: 100%;
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4%;
  }

  .player {
    background: #49583a;
    border-radius: 5%;
    overflow: hidden;
    width: 100%;
    max-width: 420px;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    container-type: inline-size;
  }

  .cover-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
  }

  .cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 6s ease;
  }

  .player.playing .cover-wrap img {
    transform: scale(1.06);
  }

  .cover-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 45%, rgba(73,88,58,0.92) 100%);
  }

  .track-info-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 7% 7% 5%;
  }

  .track-title {
    color: #fff;
    font-size: clamp(13px, 4.5cqw, 19px);
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-artist {
    color: rgba(255,255,255,0.7);
    font-size: clamp(10px, 3.2cqw, 14px);
    margin-top: 0.3em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .controls-area {
    padding: 5% 6% 6%;
    display: flex;
    flex-direction: column;
    gap: 4%;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 2.5%;
  }

  .time {
    color: rgba(255,255,255,0.55);
    font-size: clamp(9px, 2.8cqw, 11px);
    min-width: 28px;
    font-variant-numeric: tabular-nums;
  }

  .time.right { text-align: right; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    outline: none;
    cursor: pointer;
    position: relative;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type="range"]:hover::-webkit-slider-thumb {
    transform: scale(1.25);
  }

  input[type="range"]::-moz-range-thumb {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
  }

  /* Buttons row */
  .buttons {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 5%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s, opacity 0.15s;
    color: #fff;
  }

  button:hover { background: rgba(255,255,255,0.12); }
  button:active { opacity: 0.7; }

  button svg {
    width: clamp(15px, 5.5cqw, 22px);
    height: clamp(15px, 5.5cqw, 22px);
  }

  .btn-play {
    width: clamp(40px, 14cqw, 56px);
    height: clamp(40px, 14cqw, 56px);
    background: rgba(255,255,255,0.15) !important;
    border-radius: 50%;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .btn-play svg {
    width: clamp(18px, 6.5cqw, 26px);
    height: clamp(18px, 6.5cqw, 26px);
  }

  .btn-play:hover { background: rgba(255,255,255,0.25) !important; }
  .btn-play:active { transform: scale(0.93); }

  .btn-repeat.active svg { opacity: 1; color: #c9e6a3; }
  .btn-repeat svg { opacity: 0.55; transition: opacity 0.2s; }

  .btn-prev svg, .btn-next svg { opacity: 0.8; }
  .btn-prev:hover svg, .btn-next:hover svg { opacity: 1; }

  .no-audio-note {
    color: rgba(255,255,255,0.45);
    font-size: clamp(8px, 2.4cqw, 10px);
    text-align: center;
    letter-spacing: 0.03em;
    min-height: 1.2em;
  }

  @container (max-width: 240px) {
    .controls-area { gap: 3%; }
  }
</style>
</head>

    <div class="cover-overlay"></div>
    <div class="track-info-overlay">
      <div class="track-title" id="trackTitle">Song Title</div>
      <div class="track-artist" id="trackArtist">Artist Name</div>
    </div>
  </div>

  <div class="controls-area">
    <div class="progress-wrap">
      <span class="time left" id="timeCurrent">0:00</span>
      <input type="range" id="progressBar" min="0" max="100" value="0" />
      <span class="time right" id="timeTotal">0:00</span>
    </div>

    <div class="buttons">
      <button class="btn-repeat" id="btnRepeat" title="Repeat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>

      <button class="btn-prev" id="btnPrev" title="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>

      <button class="btn-play" id="btnPlay" title="Play / Pause">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>

      <button class="btn-next" id="btnNext" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>

      <button id="btnVol" title="Toggle mute">
        <svg id="iconVol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <svg id="iconMute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
    </div>

    <div class="no-audio-note" id="audioNote"></div>
  </div>
</div>

<audio id="audioEl" preload="metadata"></audio>

<script>
  const tracks = [
    { title: 'Ala', artist: 'Joep Beving', src: 'https://www.dropbox.com/scl/fi/zzp52bnz1lsl0gl2n7qrx/Joep-Beving-Ala.mp3?rlkey=2f882vc1ag58qkky5kmsgqnut&st=porzh9h1&raw=1' },
    { title: 'Silver Soul', artist: 'Beach House', src: 'https://www.dropbox.com/scl/fi/d4jkw3l8ydtxy954e7fed/Beach-House-Silver-Soul.mp3?rlkey=irfvir5sfq7nc64g33yc0cuo2&st=xh1wdyfx&raw=1' },
    { title: 'La petite fille de la mer', artist: 'Vangelis', src: 'https://www.dropbox.com/scl/fi/440m7nmvn34u68rs1s3ae/vangelis-la-petite-fille-de-la-mer.mp3?rlkey=sd28348e16mipll2xqsmeom9o&st=m8rmh2vo&raw=1' },
    { title: 'Playground Love', artist: 'Air', src: 'https://www.dropbox.com/scl/fi/rmurf6b844vw20yytqdgk/Playground-love-Air.mp3?rlkey=725px533t3i5ulxjp7xupkmhc&st=57vgukld&raw=1' },
    { title: '(dream)', artist: 'salvia palth', src: 'https://www.dropbox.com/scl/fi/14410xzf31a4iidqlzmk3/salvia-plath-dream.mp3?rlkey=cj00anziiym6tjr4fh4i420d6&st=la8vp1op&raw=1' },
    { title: 'Show Me How', artist: 'Men I Trust', src: 'https://www.dropbox.com/scl/fi/3dm3heit86pw8jomrpcy7/Men-I-Trust-Show-Me-How.mp3?rlkey=7uz4wkwv6b9wyyl4pe8h25v4k&st=5hm7sgar&raw=1' },
    { title: 'Jacob and the Stone', artist: 'Emile Mosseri', src: 'https://www.dropbox.com/scl/fi/057d8v7o3i9nomjgt79ys/Emile-Mosseri-Jacob-and-the-Stone.flac?rlkey=tqh1hc3sjp0avyr3eh4tautpn&st=73s37i64&raw=1' },
    { title: 'Highschool Lover', artist: 'Air', src: 'https://www.dropbox.com/scl/fi/u0lhe1i7zgjonkeestjgo/Air-Highschool-Lover.mp3?rlkey=kmankjk3mn9iwrhavsg7vbtm3&st=omu0dhbv&raw=1' },
    { title: 'Mrs Magic', artist: 'Strawberry Guy', src: 'https://www.dropbox.com/scl/fi/rn7i7jf99mietbio0bw21/Strawberry-Guy-Mrs-Magic-Strings-Version.mp3?rlkey=9i9idss8hkurl28r6yhl6g1vf&st=82j8e0ie&raw=1' },
    { title: 'rises the moon', artist: 'Liana Flores', src: 'https://www.dropbox.com/scl/fi/eg8qpm6pgher195rsqdu4/ghost-rises-the-moon-liana-flores-instrumental-1.mp3?rlkey=jgfxj3wc3wu5q6zwu9nvxplnb&st=0u0ouf68&raw=1' }
  ];

  const audio       = document.getElementById("audioEl");
  const player      = document.getElementById("player");
  const trackTitle  = document.getElementById("trackTitle");
  const trackArtist = document.getElementById("trackArtist");
  const progressBar = document.getElementById("progressBar");
  const timeCurrent = document.getElementById("timeCurrent");
  const timeTotal   = document.getElementById("timeTotal");
  const btnPlay     = document.getElementById("btnPlay");
  const iconPlay    = document.getElementById("iconPlay");
  const iconPause   = document.getElementById("iconPause");
  const btnPrev     = document.getElementById("btnPrev");
  const btnNext     = document.getElementById("btnNext");
  const btnRepeat   = document.getElementById("btnRepeat");
  const btnVol      = document.getElementById("btnVol");
  const iconVol     = document.getElementById("iconVol");
  const iconMute    = document.getElementById("iconMute");
  const audioNote   = document.getElementById("audioNote");

  let currentIndex = 0;
  let isRepeat     = false;
  let isSeeking    = false;

  function fmt(s) {
    if (!s || isNaN(s)) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function loadTrack(index, autoplay) {
    currentIndex = ((index % tracks.length) + tracks.length) % tracks.length;
    const t = tracks[currentIndex];
    trackTitle.textContent  = t.title;
    trackArtist.textContent = t.artist;
    audio.src = t.src;
    progressBar.value = 0;
    updateFill();
    timeCurrent.textContent = "0:00";
    timeTotal.textContent   = "0:00";
    audioNote.textContent = "";
    if (autoplay) audio.play().catch(() => { audioNote.textContent = "Couldn't load track"; });
  }

  function setPlaying(state) {
    iconPlay.style.display  = state ? "none"  : "";
    iconPause.style.display = state ? ""      : "none";
    player.classList.toggle("playing", state);
  }

  btnPlay.addEventListener("click", () => {
    if (audio.paused) { audio.play().catch(() => { audioNote.textContent = "Couldn't load track"; }); }
    else { audio.pause(); }
  });

  btnNext.addEventListener("click", () => {
    loadTrack(currentIndex + 1, !audio.paused);
  });

  btnPrev.addEventListener("click", () => {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    loadTrack(currentIndex - 1, !audio.paused);
  });

  btnRepeat.addEventListener("click", () => {
    isRepeat = !isRepeat;
    btnRepeat.classList.toggle("active", isRepeat);
    audio.loop = isRepeat;
  });

  btnVol.addEventListener("click", () => {
    audio.muted = !audio.muted;
    iconVol.style.display  = audio.muted ? "none" : "";
    iconMute.style.display = audio.muted ? "" : "none";
  });

  audio.addEventListener("play",  () => setPlaying(true));
  audio.addEventListener("pause", () => setPlaying(false));
  audio.addEventListener("ended", () => {
    if (!isRepeat) loadTrack(currentIndex + 1, true);
  });

  audio.addEventListener("timeupdate", () => {
    if (!isSeeking && audio.duration) {
      progressBar.value = (audio.currentTime / audio.duration) * 100;
      timeCurrent.textContent = fmt(audio.currentTime);
      updateFill();
    }
  });

  audio.addEventListener("loadedmetadata", () => {
    timeTotal.textContent = fmt(audio.duration);
  });

  audio.addEventListener("error", () => {
    audioNote.textContent = "Couldn't load track";
  });

  progressBar.addEventListener("mousedown", () => isSeeking = true);
  progressBar.addEventListener("touchstart", () => isSeeking = true);
  progressBar.addEventListener("input", () => {
    if (audio.duration) {
      const t = (progressBar.value / 100) * audio.duration;
      timeCurrent.textContent = fmt(t);
    }
    updateFill();
  });
  progressBar.addEventListener("change", () => {
    if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration;
    isSeeking = false;
  });

  function updateFill() {
    const pct = progressBar.value + "%";
    progressBar.style.background =
      "linear-gradient(to right, rgba(255,255,255,0.85) " + pct + ", rgba(255,255,255,0.2) " + pct + ")";
  }

  // Init
  loadTrack(0, false);
</script>
